version: 2

models:
  - name: stg_market__stock_prices
    description: >
      Cleaned and deduplicated daily stock prices from the raw ingestion table.
      One row per ticker per trading date, keeping the most recently loaded record.
    columns:
      - name: ticker_symbol
        description: Ticker symbol (e.g. AAPL).
        tests:
          - not_null
      - name: trading_date
        description: The trading date for this price record.
        tests:
          - not_null
      - name: open_price
        description: Opening price of the trading day.
        tests:
          - not_null
      - name: high_price
        description: Intraday high price.
        tests:
          - not_null
      - name: low_price
        description: Intraday low price.
        tests:
          - not_null
      - name: close_price
        description: Closing price of the trading day.
        tests:
          - not_null
      - name: volume
        description: Number of shares traded.
        tests:
          - not_null
      - name: data_source
        description: Origin of the data.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["alpha_vantage"]

  - name: stg_market__tickers
    description: >
      All tickers from the watchlist, both active and inactive.
      Downstream models filter on is_active as needed.
    columns:
      - name: ticker_id
        description: Surrogate primary key from APP.WATCHLIST.
        tests:
          - not_null
          - unique
      - name: ticker_symbol
        description: Ticker symbol. Unique across all rows.
        tests:
          - not_null
          - unique
      - name: is_active
        description: False means the ticker has been soft-deleted.
        tests:
          - not_null
